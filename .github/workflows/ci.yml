name: Brutalist MCP CI

on:
  push:
    branches: [main]
    tags:
      # Only full vMAJOR.MINOR.PATCH release tags trigger CI/publish. The
      # moving tags the `move-tags` job force-pushes (vMAJOR, vMAJOR.MINOR)
      # have fewer dot-segments and so never match this glob — that's what
      # keeps repointing @v1 from re-triggering a build or a duplicate publish.
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 24.x]
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests (root @brutalist/mcp)
        run: npm test -- tests/unit tests/integration/pagination-e2e.test.ts tests/integration/cache.integration.test.ts tests/smoke

      - name: Run tests (packages/orchestrator)
        run: npm test --workspace=packages/orchestrator
        env:
          # ts-jest under workspaces requires the experimental flag for ESM.
          NODE_OPTIONS: --experimental-vm-modules

      - name: Build packages/orchestrator
        # Must run before github-action's tests AND verify-dist.
        # github-action's TypeScript imports `@brutalist/orchestrator`,
        # which resolves via package.json `main: dist/index.js`. Without
        # a pre-built orchestrator dist, ts-jest fails to find the
        # module and every github-action test suite errors with TS2307.
        # The build also feeds verify-dist below: ncc bundles the
        # orchestrator into the action artifact, so we need fresh
        # upstream code visible to ncc.
        run: npm run build --workspace=packages/orchestrator

      - name: Run tests (packages/github-action)
        run: npm test --workspace=packages/github-action
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: Verify github-action dist/ is fresh
        run: npm run verify-dist --workspace=packages/github-action

      - name: Validate action.yml inputs are expression-free
        # Composite action.yml inputs (descriptions/defaults) must NOT contain
        # GitHub Actions expression syntax — GitHub evaluates it at load time,
        # where contexts like `secrets` are unavailable, so the WHOLE action
        # fails to load for every consumer on @v1 (a fleet-wide outage; that is
        # exactly how the GLM_TOKEN example in custom-claude-clients broke
        # v1.18.0). jest never loads action.yml as a consumer, so this is the
        # only guard that catches it. NB: the marker is built from parts so this
        # very step doesn't trip the same evaluation it's guarding against.
        run: |
          python3 - <<'PY'
          import yaml, sys
          marker = '$' + '{{'
          doc = yaml.safe_load(open('packages/github-action/action.yml'))
          bad = [k for k, v in (doc.get('inputs') or {}).items()
                 if any(marker in str(x) for x in (v or {}).values())]
          if bad:
              print('::error::action.yml inputs must not contain GH expression syntax:', ', '.join(bad))
              sys.exit(1)
          print('action.yml inputs are expression-free.')
          PY

      - name: Build
        run: npm run build

      - name: Verify root dist/ is fresh
        # The brutalist-mcp binary points at root dist/index.js (see
        # package.json `bin`). If src/ outpaced dist/ in this PR, the
        # published binary would ship stale code — silently masking
        # the security and correctness fixes contributors thought
        # they'd shipped. We just ran `npm run build` above, so any
        # diff against the committed dist/ means it was stale.
        run: |
          if ! git diff --quiet -- dist/; then
            echo "::error::Root dist/ is out of date with src/. Run 'npm run build' and commit the result."
            git diff --stat -- dist/
            exit 1
          fi
          echo "Root dist/ matches src/."

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # Required for creating releases
      id-token: write   # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Use Node.js 24.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --provenance --access public
        # Uses OIDC trusted publishing - no token needed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Repoint the moving major/minor tags (@v1, @v1.14) at each release so
  # consumers who pin `…/github-action@v1` actually receive patches. Runs only
  # after a successful publish, so a moving tag never advertises a half-shipped
  # release. Pushes via GITHUB_TOKEN (which by design does not re-trigger
  # workflows) AND the tags it writes don't match the v*.*.* trigger — two
  # independent guards against recursion / a duplicate npm publish.
  move-tags:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # force-push the moving tags
    steps:
      # GITHUB_TOKEN (a GitHub App) is REFUSED when force-pushing a moving tag
      # onto a release commit that changed any .github/workflows/ file — and
      # there is no `workflows` permission to grant it. Use a PAT with `workflow`
      # scope (secret MOVE_TAGS_PAT) when present so @vMAJOR/@vMAJOR.MINOR still
      # advance for workflow-touching releases; fall back to github.token (prior
      # behavior) when the secret is absent, so this never blocks the publish.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.MOVE_TAGS_PAT || github.token }}

      - name: Repoint @vMAJOR and @vMAJOR.MINOR at this release
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          # Defensive: only act on a real vMAJOR.MINOR.PATCH tag. The trigger
          # already enforces this, but a manual re-run on an odd ref shouldn't
          # clobber a moving tag.
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::notice::'$tag' is not a vMAJOR.MINOR.PATCH release tag; skipping moving-tag update."
            exit 0
          fi
          # Prereleases (e.g. v1.15.0-rc.1) publish but must not advance the
          # stable moving tags consumers track.
          if [[ "$tag" == *-* ]]; then
            echo "::notice::'$tag' is a prerelease; leaving @vMAJOR/@vMAJOR.MINOR untouched."
            exit 0
          fi
          major="${tag%%.*}"   # v1.14.8 -> v1
          minor="${tag%.*}"    # v1.14.8 -> v1.14
          echo "Repointing $major and $minor -> $tag (${GITHUB_SHA})"
          git tag -f "$major" "$GITHUB_SHA"
          git tag -f "$minor" "$GITHUB_SHA"
          git push -f origin "refs/tags/$major" "refs/tags/$minor"