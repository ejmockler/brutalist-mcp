name: Brutalist Review

# Dogfood: the brutalist-mcp repo runs its own action on incoming PRs.
# Pinned to v1.14.0 so this workflow doesn't trail mainline changes
# silently — bump the tag manually when shipping a new release.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read          # actions/checkout
  pull-requests: write    # post the review

jobs:
  brutalist:
    runs-on: ubuntu-latest
    # Skip on draft PRs and on PRs from forks (forks don't have access
    # to the OAUTH secrets, so the preflight would fail noisily).
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI critics
        # claude + brutalist-mcp are hard preflight requirements. codex
        # and agy are soft critics (warn if missing). gemini-cli was
        # removed in v1.14.0 ahead of Google's 2026-06-18 sunset — agy
        # is its successor.
        run: |
          npm install -g @brutalist/mcp@1.14.0 \
                         @anthropic-ai/claude-code \
                         @openai/codex
          curl -fsSL https://antigravity.google/cli/install.sh | bash
          # Antigravity install.sh drops the binary at ~/.local/bin/agy;
          # ensure it's on PATH for the action's spawn.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Brutalist review
        uses: ejmockler/brutalist-mcp/packages/github-action@v1.14.0
        with:
          # github.token is a workflow context — not available inside
          # action.yml's `default:` field — so the workflow must pass it.
          github-token: ${{ github.token }}
          anthropic-oauth-token: ${{ secrets.ANTHROPIC_OAUTH_TOKEN }}
          codex-auth: ${{ secrets.CODEX_AUTH }}
          agy-oauth-token: ${{ secrets.AGY_OAUTH_TOKEN }}
          minimum-severity: medium
