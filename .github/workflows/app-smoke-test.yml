name: App Token Smoke Test

# One-off validation that the codex-write-back GitHub App works end-to-end:
# mint an ephemeral installation token, prove it can write AND delete a repo
# secret (Secrets:write), then clean up. No critics, no Claude token, no PR —
# trigger manually with `gh workflow run "App Token Smoke Test"`.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token (ephemeral, 1h)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CODEX_AUTH_APP_ID }}
          private-key: ${{ secrets.CODEX_AUTH_APP_PRIVATE_KEY }}

      - name: Prove Secrets:write (set + delete a throwaway secret)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          echo "App token minted OK."
          echo -n "smoke-ok" | gh secret set BRUTALIST_APP_SMOKE_TEST --repo "${{ github.repository }}"
          echo "✓ App wrote a secret (Secrets:write confirmed)."
          gh secret delete BRUTALIST_APP_SMOKE_TEST --repo "${{ github.repository }}"
          echo "✓ Cleaned up throwaway secret."
          echo "SMOKE TEST PASSED — the App can self-heal CODEX_AUTH."
