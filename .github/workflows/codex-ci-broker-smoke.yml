name: Codex CI Broker Smoke
on: workflow_dispatch
permissions:
  contents: read
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install codex
        run: npm install -g @openai/codex
      - name: Provision brokered codex auth + disable broken image tool
        env:
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
        run: |
          if [ -z "$CODEX_AUTH" ]; then echo "CODEX_AUTH empty (broker hasn't pushed?)"; exit 1; fi
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH" > "$HOME/.codex/auth.json"; chmod 600 "$HOME/.codex/auth.json"
          printf '[features]\nimage_generation = false\n' > "$HOME/.codex/config.toml"
          node -e "const a=require(process.env.HOME+'/.codex/auth.json'); console.log('auth_mode:',a.auth_mode,'| refresh_blank:',a.tokens.refresh_token===''); "
      - name: codex exec smoke (brokered token, image tool disabled)
        run: |
          set +e
          OUT=$(printf '%s' "Reply with exactly this token: CI-CODEX-BROKER-OK" | codex exec --sandbox read-only --skip-git-repo-check 2>&1)
          echo "----- codex output (tail) -----"; echo "$OUT" | tail -12; echo "-------------------------------"
          if echo "$OUT" | grep -q "CI-CODEX-BROKER-OK"; then
            echo "PASS: codex authenticated + ran in CI via the noot-1 broker token (no tailnet, no refresh)."
          else
            echo "FAIL"; exit 1
          fi
