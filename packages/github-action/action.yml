name: 'Brutalist Code Review'
description: 'Multi-CLI brutalist code review (Claude, Codex, Gemini) posted as inline PR comments via the @brutalist/orchestrator.'
author: 'Brutalist'
branding:
  icon: 'alert-triangle'
  color: 'red'
inputs:
  anthropic-oauth-token:
    description: |
      Long-lived Anthropic OAuth token from `claude setup-token`. Required.
      Store as a repository secret and reference like:
        ${{ secrets.ANTHROPIC_OAUTH_TOKEN }}
      The token authenticates the orchestrator's Claude Agent SDK session
      and is passed through to the spawned brutalist-mcp subprocess for
      its own Claude critic.
    required: true
  github-token:
    description: |
      Token used to post the PR review. Defaults to the workflow-provided
      ${{ github.token }} (GITHUB_TOKEN). Must have the `pull-requests: write`
      permission on the workflow.
    required: false
    default: ${{ github.token }}
  openai-api-key:
    description: |
      Optional OpenAI API key for the Codex CLI critic. Falls back when
      codex-auth (OAuth) is absent. Mutually exclusive with codex-auth —
      OAuth wins if both are provided.
    required: false
  google-api-key:
    description: |
      Optional Google API key for the Gemini CLI critic. Falls back when
      gemini-oauth-creds + gemini-google-accounts (OAuth) are absent.
      Mutually exclusive with the Gemini OAuth inputs — OAuth wins if both.
    required: false
  codex-auth:
    description: |
      Full contents of ~/.codex/auth.json from `codex login`. When provided,
      Codex uses ChatGPT-account OAuth (no OPENAI_API_KEY required).

      One-time capture locally:
        codex login
        gh secret set CODEX_AUTH < ~/.codex/auth.json

      Note: Codex's CLI rotates the access_token + last_refresh fields on
      use; in CI those writes are lost when the runner is destroyed. The
      refresh_token in your secret is what survives across runs. If runs
      start failing auth after weeks, re-run `codex login` and update the
      secret.
    required: false
  gemini-oauth-creds:
    description: |
      Full contents of ~/.gemini/oauth_creds.json from the first interactive
      `gemini` run. Paired with gemini-google-accounts (both required for
      Gemini OAuth to work in CI).

      One-time capture locally:
        gemini "hi"   # triggers OAuth browser flow on first run
        gh secret set GEMINI_OAUTH_CREDS < ~/.gemini/oauth_creds.json
        gh secret set GEMINI_GOOGLE_ACCOUNTS < ~/.gemini/google_accounts.json
    required: false
  gemini-google-accounts:
    description: |
      Full contents of ~/.gemini/google_accounts.json. Paired with
      gemini-oauth-creds; both required together — the file binds the
      OAuth credentials to a specific Google account.
    required: false
  working-directory:
    description: |
      Subtree of the repository to focus on. Defaults to the repo root.
      Useful when only a particular package or service should be analyzed.
    required: false
    default: '.'
  minimum-severity:
    description: |
      Filter: only inline-comment findings at this severity or above.
      Lower-severity findings still appear in the review summary.
      One of: critical, high, medium, low, nit. Default: low.
    required: false
    default: 'low'
  max-diff-chars:
    description: |
      Maximum diff size in characters passed to the orchestrator. Diffs
      above this threshold are truncated to keep prompt budgets in check
      and a warning is emitted. Set higher (e.g. 200000) for monorepo
      PRs where partial diff context produces unreliable findings.
      Default: 80000.
    required: false
    default: '80000'
runs:
  using: 'node20'
  main: 'dist/index.js'
