name: Codex Auth Smoke Test

# One-off: does codex authenticate via the access_token ALONE (refresh_token
# blanked) on the ChatGPT plan? Mirrors the adapter's invocation. Uses the
# OpenAI/ChatGPT backend — NOT Claude — so it doesn't touch the Claude limit.
# Trigger: gh workflow run "Codex Auth Smoke Test".
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install codex
        run: npm install -g @openai/codex

      - name: Provision blanked-refresh codex auth
        env:
          CODEX_AUTH: ${{ secrets.CODEX_AUTH_NOREFRESH_TEST }}
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          echo "auth.json provisioned ($(wc -c < "$HOME/.codex/auth.json") bytes)"
          node -e "const a=require(process.env.HOME+'/.codex/auth.json'); console.log('auth_mode:', a.auth_mode, '| refresh blank:', a.tokens.refresh_token===''); "

      - name: codex exec smoke (access_token only, no refresh)
        run: |
          set +e
          OUT=$(printf '%s' "Reply with exactly this token and nothing else: CODEX-AUTH-OK" \
            | codex exec --sandbox read-only --skip-git-repo-check 2>&1)
          RC=$?
          echo "exit=$RC"
          echo "----- codex output (head) -----"
          echo "$OUT" | head -40
          echo "-------------------------------"
          if echo "$OUT" | grep -q "CODEX-AUTH-OK"; then
            echo "RESULT: PASS — codex authenticated via access_token alone (no refresh needed). The no-refresh trick works."
            exit 0
          elif echo "$OUT" | grep -qiE "refresh_token_reused|Failed to refresh|refresh token|401|unauthorized|expired|not logged in|auth"; then
            echo "RESULT: FAIL — access_token rejected / auth dead. A fresh 'codex login' is required."
            exit 1
          else
            echo "RESULT: INCONCLUSIVE — codex ran but no sentinel; inspect output above."
            exit 1
          fi
