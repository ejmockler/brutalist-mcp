name: Brutalist Review

# claude + codex + agy review on every PR, posted as inline comments.
# Codex auth: the noot-1 broker pushes a fresh ChatGPT-plan access_token
# (refresh blanked) to the CODEX_AUTH secret out-of-band (no tailnet, no
# inbound). CI just reads it; codex never refreshes. The image_generation
# tool is disabled (codex#21952 gpt-image-2 bug).
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  brutalist:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install CLI critics
        run: |
          # codex 0.115+ sandboxes its model-run shell tools with bubblewrap; on
          # ubuntu-24.04 runners kernel.apparmor_restrict_unprivileged_userns=1
          # blocks bwrap's user-namespace setup → "bwrap: loopback: Failed
          # RTM_NEWADDR: Operation not permitted" → codex can exec nothing and
          # falls back to a diff-only (not codebase-grounded) review. Lift the
          # restriction so codex's read-only sandbox can build its netns/loopback
          # and read the checked-out tree. (A ~/.codex/config.toml sandbox setting
          # would NOT work: the adapter passes an explicit --sandbox read-only,
          # which overrides config; this host sysctl is the effective fix.)
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          # Pin every critic CLI — an unpinned @latest runs before secrets exist,
          # but a planted binary persists and later receives the OAuth tokens.
          npm install -g @brutalist/mcp@1.18.6 @anthropic-ai/claude-code@2.1.162 @openai/codex@0.136.0
          # NOTE: agy installer is unpinned upstream (no published checksum) — residual supply-chain surface.
          curl -fsSL https://antigravity.google/cli/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # codex: disable the broken built-in image_generation tool (gpt-image-2)
          mkdir -p "$HOME/.codex"
          printf '[features]\nimage_generation = false\n' > "$HOME/.codex/config.toml"
      - name: Brutalist review
        # Tracks the moving @v1 tag — repointed to each release by the upstream
        # move-tags automation — so the fleet auto-updates to the latest brutalist
        # action. Trust root is the owner-controlled ejmockler/brutalist-mcp repo +
        # release pipeline (same owner as this repo). @v1 ships the turn-cap 20→50
        # fix (orchestrator default 50) so the brain no longer exhausts turns.
        uses: ejmockler/brutalist-mcp/packages/github-action@v1
        env:
          # Per-critic cap (claude/codex): 30 min. As of 1.18.0 agy self-caps at
          # 6 min (BRUTALIST_AGY_TIMEOUT) so a stall fails fast instead of burning
          # this full 30-min budget; the orchestrator gets 45 min so the brain
          # still has room to work after the slowest critic returns.
          BRUTALIST_TIMEOUT: "1800000"
          BRUTALIST_ORCHESTRATOR_TIMEOUT_MS: "2700000"
          # Freeze agy's binary for the whole job. agy self-updates from a
          # us-central1 endpoint, and an uncontrolled 1.0.2 -> 1.0.10 self-update is
          # what originally broke this critic (15-min timeouts, no output). 1.18.0's
          # adapter also sets this on the spawned agy process; job-level covers the
          # `curl install.sh` step too.
          AGY_CLI_DISABLE_AUTO_UPDATE: "1"
        with:
          github-token: ${{ github.token }}
          anthropic-oauth-token: ${{ secrets.ANTHROPIC_OAUTH_TOKEN }}
          codex-auth: ${{ secrets.CODEX_AUTH }}
          agy-oauth-token: ${{ secrets.AGY_OAUTH_TOKEN }}
          minimum-severity: medium
          # claude critic + orchestrator brain run Opus 4.8 with the 1M context
          # window. The [1m] suffix is the RELIABLE lever (Claude Code parses and
          # strips it before the request); the silent Max auto-upgrade is flaky.
          # Requires this OAuth token to be Max/Team/Enterprise — on a Pro token
          # [1m] can error. Does NOT change chunk SIZE: codex (~200k) still governs
          # the diff-chunk window, so this only buys claude headroom (no compaction,
          # better synthesis), not fewer chunks. CLI pin (2.1.162) already supports it.
          model: "claude-opus-4-8[1m]"
          # GLM routed critic — Anthropic-compatible gateway (public Tailscale Funnel).
          # Additive 4th critic, hardened by default (no web/MCP, no native creds —
          # verified: includeProcessAuth:false + authTokenEnv). Native critics are
          # unaffected. Latency: GLM is the SLOWEST critic (~5min even healthy). A
          # truly-DOWN gateway fails fast (~5s preflight), but an OVER-QUOTA 429
          # retries ~3-4min per chunk. Reviews are advisory, so this never gates merges.
          # glm-5.2 has a 1M context window (was glm-5.1/128k) — so GLM no longer
          # caps the diff-chunk min; codex (~200k) governs. The declared window must
          # match glm-5.2's real window so the min still protects GLM from overflow.
          custom-claude-client-id: glm
          custom-claude-base-url: https://immersivecommons13.tail5da903.ts.net
          custom-claude-auth-token: ${{ secrets.GLM_TOKEN }}
          custom-claude-model: glm-5.2
          custom-claude-small-fast-model: glm-4.5-air
          custom-claude-context-window: 1000000
