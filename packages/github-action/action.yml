name: 'Brutalist Code Review'
description: 'Multi-CLI brutalist code review (Claude, Codex, Antigravity) posted as inline PR comments via the @brutalist/orchestrator.'
author: 'Brutalist'
branding:
  icon: 'alert-triangle'
  color: 'red'
inputs:
  anthropic-oauth-token:
    description: >-
      Long-lived Anthropic OAuth token from `claude setup-token`. Required.
      Store as a repository secret and reference via secrets.ANTHROPIC_OAUTH_TOKEN
      in your workflow file. The token authenticates the orchestrator's
      Claude Agent SDK session and is passed through to the spawned
      brutalist-mcp subprocess for its own Claude critic.
    required: true
  github-token:
    description: >-
      Token used to post the PR review. If omitted, falls back to the
      GITHUB_TOKEN environment variable provided by the runner. Needs the
      pull-requests:write permission on the workflow.
    required: false
  openai-api-key:
    description: |
      Optional OpenAI API key for the Codex CLI critic. Falls back when
      codex-auth (OAuth) is absent. Mutually exclusive with codex-auth —
      OAuth wins if both are provided.
    required: false
  codex-auth:
    description: |
      Full contents of ~/.codex/auth.json from `codex login`. When provided,
      Codex uses ChatGPT-account OAuth (no OPENAI_API_KEY required).

      One-time capture locally:
        codex login
        gh secret set CODEX_AUTH < ~/.codex/auth.json

      Note: Codex's CLI rotates the access_token + last_refresh fields on
      use; in CI those writes are lost when the runner is destroyed. The
      refresh_token in your secret is what survives across runs. If runs
      start failing auth after weeks, re-run `codex login` and update the
      secret.
    required: false
  agy-oauth-token:
    description: |
      Raw JSON contents of the macOS keychain "gemini/antigravity" entry —
      the OAuth token for the Antigravity (agy) CLI critic. Without this,
      agy cannot authenticate in CI runners (no env-var/API-key auth path
      exists — agy issue #78). With it, the Action writes the JSON to
      ~/.gemini/antigravity-cli/antigravity-oauth-token (mode 0600); agy
      auto-detects the container environment and reads tokens from there.

      One-time capture locally (after you've run `agy "hi"` interactively
      and completed the browser OAuth flow):
        security find-generic-password -s gemini -a antigravity -w \
          | sed 's/^go-keyring-base64://' | base64 -d \
          | gh secret set AGY_OAUTH_TOKEN

      Note: agy rotates the access_token in-place on expiry but leaves
      the refresh_token stable across rotations. In CI those rewrites
      are lost when the runner is destroyed; each run starts from the
      secret's refresh_token. If runs start failing after months, re-run
      `agy "hi"` and re-capture the keychain entry.
    required: false
  working-directory:
    description: |
      Subtree of the repository to focus on. Defaults to the repo root.
      Useful when only a particular package or service should be analyzed.
    required: false
    default: '.'
  minimum-severity:
    description: |
      Filter: only inline-comment findings at this severity or above.
      Lower-severity findings still appear in the review summary.
      One of: critical, high, medium, low, nit. Default: low.
    required: false
    default: 'low'
  max-diff-chars:
    description: |
      Total safety cap on diff size in characters. Diffs above this are
      truncated at a file boundary with a warning. This is the OUTER bound on
      cost — the diff is chunked (see context-window-tokens) so the whole diff
      up to this cap is reviewed, not just the first context-window worth.
      Default: 2000000.
    required: false
    default: '2000000'
  model:
    description: |
      Model for the orchestrator brain and the Claude critic. Defaults to the
      most capable model. The Claude critic picks it up via ~/.claude/settings.json
      (written by the action); the brain uses it directly via the Agent SDK.
      Default: claude-opus-4-8.
    required: false
    default: 'claude-opus-4-8'
  claude-critic-model:
    description: |
      Native Claude Code critic model. Defaults to model. This only affects the
      inner Brutalist Claude critic; the orchestrator brain uses model.
    required: false
  custom-claude-client-id:
    description: |
      Display id for an additional Claude Code critic routed through a custom
      Anthropic-compatible endpoint. Default: custom-claude.
    required: false
    default: 'custom-claude'
  custom-claude-base-url:
    description: |
      Optional ANTHROPIC_BASE_URL for an additional Claude Code critic. Use this
      for Anthropic-compatible gateways such as GLM/Z.AI routes.
    required: false
  custom-claude-auth-token:
    description: |
      Optional bearer token for the custom Claude Code critic
      (ANTHROPIC_AUTH_TOKEN). Store as a repository secret.
    required: false
  custom-claude-model:
    description: |
      Model name for the custom Claude Code critic, e.g. glm-5.1.
    required: false
  custom-claude-small-fast-model:
    description: |
      Optional ANTHROPIC_SMALL_FAST_MODEL for the custom Claude Code critic,
      e.g. glm-4.5-air.
    required: false
  custom-claude-clients:
    description: |
      JSON array routing an ARBITRARY number of additional Claude Code critics
      (up to 16) through custom Anthropic-compatible endpoints, in one review.
      Each entry: {id, baseUrl, authToken, model, smallFastModel?,
      contextWindow?, containment?}. ADDITIVE to the native critics. Works
      ALONGSIDE the singular custom-claude-* inputs above: if that trio is set
      it appends ONE more client (deduped by id, keep-first — a custom-claude-
      clients entry wins on collision). containment defaults to "hardened";
      set "standard" to restore web/MCP tools for an endpoint you fully trust.
      Each entry's authToken is moved into a dedicated env var and referenced via
      authTokenEnv — raw tokens are never inlined into the forwarded
      BRUTALIST_CLAUDE_CLIENTS. Every client gets an isolated config dir
      (~/.brutalist/claude-clients/<id>, mode 0700) and is isolated + hardened
      by default (no native creds, no WebFetch/WebSearch/MCP). The diff chunker
      sizes chunks to the SMALLEST participant contextWindow. Example:
      custom-claude-clients: |
        [
          { "id": "glm", "baseUrl": "https://glm.example/v1",
            "authToken": "<your token; pass via secrets.* in your workflow>",
            "model": "glm-5.1", "contextWindow": 128000 }
        ]
    required: false
  custom-claude-context-window:
    description: |
      Context window (tokens) of the custom Claude-routed critic model, e.g.
      128000 for GLM-4.5. The diff chunker sizes chunks to the SMALLEST
      participant window, so set this when the routed model's window is below
      context-window-tokens to avoid 'prompt too long'.
    required: false
  context-window-tokens:
    description: |
      Governing context window (in tokens) used to size diff chunks. Set this
      to the SMALLEST context window among the participating models so every
      critic can review every chunk. Under OAuth/subscription auth the usable
      window is ~200K even for 1M-capable models; raise this only if you have
      auth (e.g. an API key) that unlocks a larger usable window.
      Default: 200000.
    required: false
    default: '200000'
  context-headroom-pct:
    description: |
      Percentage of the context window reserved as working room for the agent
      (reasoning, tool round-trips, output). A diff chunk uses at most
      (100 − this)% of the window. Default: 40 (chunks ≤ 60% of the window).
    required: false
    default: '40'
  chunk-concurrency:
    description: |
      Maximum number of chunk reviews to run in parallel for diffs that span
      multiple chunks. Higher is faster (a multi-chunk diff finishes in fewer
      sequential waves, so it fits tighter job timeout-minutes) but more likely
      to hit subscription rate limits. Default: 6.
    required: false
    default: '6'
runs:
  using: 'node24'
  main: 'dist/index.js'
